name: Build NextBSD Userland (Darwin system layer)

# Cross-builds the Darwin system layer (Mach / launchd / configd / CoreFoundation
# / IOKit + daemons) on an Ubuntu host with the nextbsd-kernel-toolchain clang
# cross-compiler. REUSES the image's baked kernel-toolchain via `buildenv`
# (no per-run toolchain rebuild). Publishes a rolling `continuous` userland
# artifact that the nextbsd ISO assembler ingests.
#
# Scope: Tier 0-2 only (see README) — NO POSIX command suites (those come from
# FreeBSD via nextbsd-freebsd-compat's srclist) and NO PAM (a later pass).
# amd64 + arm64, both cross-built on the x86_64 runner.

on:
  repository_dispatch:
    types: [base-updated]        # from nextbsd-freebsd-compat after its base `continuous` refresh
  pull_request:
    paths: ['src/**', 'build-userland.sh', 'cmake/**', '.github/workflows/build.yml']
  workflow_dispatch:
    inputs:
      fbsd_sha:
        description: 'Pinned FreeBSD SHA for the toolchain image tag (blank = latest)'
        required: false
        default: ''

jobs:
  userland:
    name: userland (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            target_arch: amd64
          - target: arm64
            target_arch: aarch64
    container:
      # Per-arch toolchain image: provides the clang cross-compiler at
      # $CROSS_BINDIR, FreeBSD /usr/src + make.py, and the baked kernel-toolchain.
      image: ghcr.io/nextbsd-redux/nextbsd-kernel-toolchain:${{ matrix.target }}-${{ (github.event.client_payload.fbsd_sha || inputs.fbsd_sha) && format('fbsd-{0}', github.event.client_payload.fbsd_sha || inputs.fbsd_sha) || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      # (A) Stage the cross SYSROOT from compat's `continuous` base — the built
      #     libc/libsys/libs (+ headers) the Darwin stack links against. HARD
      #     dependency: userland is downstream of compat.
      - name: Stage sysroot from compat continuous
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/sysroot"
          gh release download continuous \
            --repo nextbsd-redux/nextbsd-freebsd-compat \
            --pattern "nextbsd-base-${{ matrix.target }}.tar.gz" \
            --output /tmp/base.tar.gz --clobber
          tar -C "$GITHUB_WORKSPACE/sysroot" -xzf /tmp/base.tar.gz

      # (A2) Host build deps the toolchain image doesn't ship. The kernel/compat
      #      cross-builds never use CMake, so the kernel-toolchain image lacks
      #      cmake/ninja — but the two CMake components (libdispatch,
      #      swift-foundation-icu) need them on the BUILD host. bison/flex/gcc/
      #      bmake are already in the image. (Future: bake these into the image.)
      - name: Install host build deps (cmake/ninja for the CMake components)
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends cmake ninja-build

      # (B) Cross-build Tiers 0-2 into /stage. build-userland.sh enters
      #     `make.py buildenv` per component (reusing the baked kernel-toolchain
      #     — no rebuild) and owns the dependency order.
      - name: Build Darwin system layer into /stage
        env:
          T: ${{ matrix.target }}
          TA: ${{ matrix.target_arch }}
          SYSROOT: ${{ github.workspace }}/sysroot
          DESTDIR: /stage
        run: |
          chmod +x ./build-userland.sh
          ./build-userland.sh

      # (D) Pack — raw tar of /stage rooted at / (so /usr/lib/system, /sbin,
      #     /usr/sbin, /usr/include, /usr/tests). nextbsd extracts it over the base.
      - name: Pack userland artifact
        run: |
          rm -f /stage/METALOG
          # (placeholder) re-apply setuid bits the unprivileged cross-install
          # drops — none in the Tier 0-2 system layer today.
          tar -C /stage -czf "/tmp/nextbsd-userland-${{ matrix.target }}.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: nextbsd-userland-${{ matrix.target }}
          path: /tmp/nextbsd-userland-${{ matrix.target }}.tar.gz

  # PR-only boot smoke test: overlay THIS PR's userland onto the latest published
  # NextBSD `continuous` .img and boot it, so we catch a userland change that
  # breaks boot (launchd as PID 1, the /usr/lib/system dylibs resolving, configd
  # coming up) before it merges. releng/15.1 is pinned, so the shipped base+kernel
  # ABI stays stable while only the Darwin userland layer is swapped. Mirrors
  # nextbsd-kernel's smoke-test, swapping the kernel-binary inject for a userland
  # tarball overlay. amd64 only (no arm64 image is published yet). Runs ONLY on
  # pull_request; does NOT gate `publish` or the downstream cascade.
  smoke-test:
    name: smoke-test (boot continuous .img with this userland)
    needs: userland
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      # The image (~2G raw) + a FreeBSD VM + qemu need headroom.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      # This run's freshly-built userland (raw tar rooted at /).
      - name: Download this run's userland artifact
        uses: actions/download-artifact@v4
        with:
          name: nextbsd-userland-amd64
          path: userland-dl

      # Latest CI-gated NextBSD image. Unzip to a raw disk.img we can md-mount.
      - name: Download nextbsd continuous .img
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh release download continuous -R nextbsd-redux/nextbsd \
            --pattern '*.img.zip' --dir img --clobber
          MEMBER=$(unzip -Z1 img/*.img.zip | grep -E '\.img$' | head -1)
          [ -n "$MEMBER" ] || { echo "no .img member in published zip" >&2; exit 1; }
          unzip -p img/*.img.zip "$MEMBER" > disk.img
          rm -rf img
          ls -lh disk.img

      # The root is freebsd-ufs (not writable from Linux), so overlay the userland
      # inside a FreeBSD VM: md-attach the image, mount the ROOTFS partition,
      # extract the userland tarball over it, unmount. copyback brings disk.img back.
      - name: Overlay this userland onto the .img UFS root
        uses: vmactions/freebsd-vm@v1
        with:
          release: '15.1'
          usesh: true
          sync: rsync
          copyback: true
          run: |
            set -eu
            TARBALL=$(find userland-dl -name 'nextbsd-userland-amd64.tar.gz' | head -1)
            [ -n "$TARBALL" ] || { echo "no userland artifact" >&2; exit 1; }
            echo "==> overlaying $TARBALL"
            md=$(mdconfig -a -t vnode -f disk.img)
            echo "    md device: $md"
            gpart show -p "$md"
            part=$(gpart show -p "$md" | awk '/freebsd-ufs/{print $3; exit}')
            [ -n "$part" ] || { echo "no freebsd-ufs partition" >&2; exit 1; }
            echo "    ufs partition: /dev/$part"
            mkdir -p /mnt-root
            mount "/dev/$part" /mnt-root
            tar -C /mnt-root -xzf "$TARBALL"
            echo "    overlaid libdispatch: $(ls -l /mnt-root/usr/lib/system/libdispatch.so 2>/dev/null || echo MISSING)"
            echo "    overlaid launchd:     $(ls -l /mnt-root/sbin/launchd 2>/dev/null || echo MISSING)"
            umount /mnt-root
            mdconfig -d -u "$md"
            echo "==> userland overlaid"

      - name: Install qemu + expect + OVMF
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 expect ovmf

      # Reuse nextbsd's canonical boot test verbatim (the on-image
      # /usr/tests/.../run.sh marker suite drives the assertions), fetched from
      # nextbsd main to stay in sync — same harness the kernel smoke-test uses.
      - name: Fetch nextbsd boot test
        run: |
          mkdir -p tests
          curl -fsSL https://raw.githubusercontent.com/nextbsd-redux/nextbsd/main/tests/boot-test.sh \
            -o tests/boot-test.sh
          chmod +x tests/boot-test.sh

      - name: Boot test (this userland in the continuous .img)
        run: ./tests/boot-test.sh disk.img

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: tests/boot.log

  publish:
    needs: userland
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Gather artifacts
        run: |
          mkdir -p out
          find artifacts -name 'nextbsd-userland-*.tar.gz' -exec cp {} out/ \;
          ls -la out/
      - name: Publish to continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous userland build
          prerelease: true
          fail_on_unmatched_files: true
          files: out/*.tar.gz
      # Cascade to the nextbsd ISO assembler ONLY on a real upstream change,
      # after `continuous` is refreshed (mirrors compat/kernel).
      - name: Trigger downstream nextbsd ISO build
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api repos/nextbsd-redux/nextbsd/dispatches \
            -f event_type=userland-updated \
            -f "client_payload[fbsd_sha]=${{ github.event.client_payload.fbsd_sha }}"
