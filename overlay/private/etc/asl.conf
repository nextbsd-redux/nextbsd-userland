##
# Minimal /etc/asl.conf for FreeBSD port (Phase J runtime).
#
# Apple's full asl.conf.osx triggered a SIGSEGV in syslogd's
# asl_action_init during parsing -- likely one of:
#   - the `> /var/log/asl/Logs/aslmanager external style=lcl-b ...`
#     directive (external rotated-archive output)
#   - `? [= Level emergency] broadcast` (broadcast action)
#   - `? ... access 0 80` (POSIX-ACL group access)
#
# Strip down to: route every message to /var/log/system.log + ASL store.
# Restore one rule at a time once the parser/handler crashes are tracked.
##

> system.log mode=0640 format=bsd
? [<= Level notice] file system.log
? [<= Level notice] store
