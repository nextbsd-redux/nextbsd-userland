# nextbsd.conf — NextBSD loader settings for the GPT disk image.
#
# A loader.conf.d fragment: the loader reads /boot/loader.conf then
# every /boot/loader.conf.d/*.conf, so this layers cleanly on top of
# the base FreeBSD loader.conf without clobbering it. The kernel mounts
# the freebsd-ufs partition read-write as / directly (vfs.root.mountfrom
# below) and execs /sbin/launchd as PID 1 — no cd9660, no uzip, no
# unionfs, no ramdisk pivot, no rc.d.

# Disk drivers are built into the NEXTBSD kernel (= GENERIC: ahci, nvme,
# virtio/vtblk/vtscsi, mfi all are `device` entries), so the kernel reaches
# the root partition at vfs_mountroot without any preload — qemu virtio,
# VirtualBox / real-hardware AHCI/NVMe, or LSI RAID alike. The old
# *_load="YES" lines were admittedly redundant ("harmless if built in"); they
# are dropped as part of shrinking loader.conf toward elimination (#180).

# mach — compiled INTO the NEXTBSD kernel (options COMPAT_MACH,
# nextbsd-kernel#10 / #181), so Mach syscalls are registered by a SYSINIT at
# boot, before PID 1 — no loader preload needed. The old `mach_load="YES"` is
# gone (step one of eliminating loader.conf, #180), and there is no longer any
# mach.ko shipped at all (the out-of-tree build was dropped — #189).

# PID 1 = launchd, and root = the freebsd-ufs "ROOTFS" label, are now BAKED
# INTO the kernel (options INIT_PATH=/sbin/launchd, ROOTDEVNAME="ufs:/dev/ufs/
# ROOTFS"; nextbsd-kernel#11 / #180). The kernel execs launchd directly and
# mounts root from the label with no loader tunables — so init_path= and
# vfs.root.mountfrom= are gone. (launchd PID 1 still remounts / read-write
# itself; the kernel mounts read-only first, as always.)

# Console: no explicit console/comconsole settings — the UEFI/BIOS
# default consoles work for laptops and VMs. CI re-enables the serial
# console at the loader OK prompt via tests/boot-test.sh before `boot`.
beastie_disable="YES"
autoboot_delay="2"

# nvidia-drm.ko reads this kenv at kmod-init time; harmless on systems
# without Nvidia hardware (kmodloader won't load nvidia-drm anyway).
hw.nvidiadrm.modeset="1"

# No firmware_path here: firmware(9) (nextbsd-kernel patch 0004) auto-searches
# each loaded kext bundle's Contents/Resources/firmware, so a driver kext's
# bundled firmware (e.g. IntelWiFi.kext's iwlwifi-*.ucode) is found with no
# configuration. /boot/firmware/ remains the built-in default for base firmware.
# (nextbsd#205)

# Don't preload /etc/hostid or /boot/entropy. The base FreeBSD
# /boot/defaults/loader.conf sets hostuuid_load + entropy_cache_load="YES",
# but this image ships neither file (on stock FreeBSD they're created by
# rc.d/hostid + rc.d/entropy; NextBSD runs launchd, not rc.d), so the loader
# printed "can't find '/etc/hostid'" / "can't find '/boot/entropy'" on every
# boot. Neither is needed here: kern.hostuuid is unused, and early entropy
# still comes from the UEFI firmware RNG (entropy_efi_seed stays "YES").
hostuuid_load="NO"
entropy_cache_load="NO"
